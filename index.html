<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/JavaScript/style.css">
    <title>Document</title>

</head>

<body class="body">
    <div id="calculator" class="body">
        <input type="text" id="display" readonly>
        <div id="back">
            <button class="btn-operator" onclick="appendToDisplay('*(1/100)')">%</button>
            <button class="btn-operator" onclick="clearDisplay()">CE</button>
            <button class="btn-operator" onclick="appendToDisplay('*(1/10)')">1/10</button>
            <button id="backspace-outer" class="btn-operator" onclick="backspace()"><div id="backspace">X</div></button>
            <button class="btn-operator" onclick="appendToDisplay('**(-1)')">1/x</button>
            <button class="btn-operator" onclick="appendToDisplay('**2')">x<sup>2</sup></button>
            <button class="btn-operator" onclick="appendToDisplay('**(1/2)')">x<sup>(1/2)</sup></button>
            <button class="btn-operator" onclick="appendToDisplay('/')">/</button>
            <button class="btn" onclick="appendToDisplay('7')">7</button>
            <button class="btn" onclick="appendToDisplay('8')">8</button>
            <button class="btn" onclick="appendToDisplay('9')">9</button>
            <button class="btn-operator" onclick="appendToDisplay('*')">*</button>
            <button class="btn" onclick="appendToDisplay('4')">4</button>
            <button class="btn" onclick="appendToDisplay('5')">5</button>
            <button class="btn" onclick="appendToDisplay('6')">6</button>
            <button class="btn-operator" onclick="appendToDisplay('-')">-</button>
            <button class="btn" onclick="appendToDisplay('1')">1</button>
            <button class="btn" onclick="appendToDisplay('2')">2</button>
            <button class="btn" onclick="appendToDisplay('3')">3</button>
            <button class="btn-operator" onclick="appendToDisplay('+')">+</button>
            <button class="btn" onclick="appendToDisplay('*(-1)')">+/-</button>
            <button class="btn" onclick="appendToDisplay('0')">0</button>
            <button class="btn" onclick="appendToDisplay('.')">.</button>
            <button class="btn-equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="/JavaScript/ek.js" defer></script>
</body>

</html>
